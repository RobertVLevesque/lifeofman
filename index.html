<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life of Man - Navigation Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Custom Cursor -->
    <div id="cursor" class="caliper-cursor"></div>

    <!-- Fixed Magazine Title -->
    <h1 class="magazine-title">LIFE OF MAN</h1>

    <!-- Parallax Background Layers -->
    <div class="background-container">
        <!-- Intro Black Screen -->
        <div id="bg-black" class="bg-layer intro-black"></div>
        <!-- Background Sections -->
        <div id="bg-woman" class="bg-layer section-bg"></div>
        <div id="bg-health" class="bg-layer section-bg"></div>
        <div id="bg-gear" class="bg-layer section-bg"></div>
        <div id="bg-cars" class="bg-layer section-bg"></div>
        <div id="bg-fashion" class="bg-layer section-bg"></div>
        <!-- Texture overlay for cockpit feel -->
        <div class="texture-overlay"></div>
        <div id="transition-glow" class="transition-glow"></div>
    </div>

    <!-- Main Interface -->
    <main class="hub-interaction">
        <!-- Left/Center: The Watch Assembly -->
        <div class="watch-container">
            <!-- Architectural SVG Vector Watch Engine -->
            <svg viewBox="0 0 1000 1000" class="vector-watch" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="dialGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#18181a"/>
                        <stop offset="100%" stop-color="#0a0a0c"/>
                    </radialGradient>
                    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#2a2a2d"/>
                        <stop offset="50%" stop-color="#141416"/>
                        <stop offset="100%" stop-color="#1a1a1c"/>
                    </linearGradient>
                    <linearGradient id="metalLight" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4a4a4f"/>
                        <stop offset="50%" stop-color="#222"/>
                        <stop offset="100%" stop-color="#3a3a3d"/>
                    </linearGradient>
                    <filter id="vectorShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/>
                    </filter>
                </defs>

                <!-- STATIC CASING & LUGS (OUTERMOST) -->
                <g class="svg-casing" filter="url(#vectorShadow)">
                    <!-- Sharp Tactical Lugs -->
                    <path d="M 300 200 L 250 50 L 380 50 L 450 150 Z" fill="url(#metalDark)" />
                    <path d="M 700 200 L 750 50 L 620 50 L 550 150 Z" fill="url(#metalDark)" />
                    <path d="M 300 800 L 250 950 L 380 950 L 450 850 Z" fill="url(#metalDark)" />
                    <path d="M 700 800 L 750 950 L 620 950 L 550 850 Z" fill="url(#metalDark)" />

                    <!-- Main Casing Barrel -->
                    <circle cx="500" cy="500" r="460" fill="url(#metalDark)" />
                    <circle cx="500" cy="500" r="445" fill="none" stroke="url(#metalLight)" stroke-width="6" />

                    <!-- Tactical 6-point Hex Screws -->
                    <circle cx="170" cy="170" r="22" fill="#111" />
                    <polygon points="170,154 184,162 184,178 170,186 156,178 156,162" fill="#333" />
                    
                    <circle cx="830" cy="170" r="22" fill="#111" />
                    <polygon points="830,154 844,162 844,178 830,186 816,178 816,162" fill="#333" />

                    <circle cx="170" cy="830" r="22" fill="#111" />
                    <polygon points="170,814 184,822 184,838 170,846 156,838 156,822" fill="#333" />

                    <circle cx="830" cy="830" r="22" fill="#111" />
                    <polygon points="830,814 844,822 844,838 830,846 816,838 816,822" fill="#333" />
                </g>

                <!-- DYNAMIC SPINNING BEZEL -->
                <!-- We apply id="watch-bezel" directly so existing JS hooks it -->
                <g id="watch-bezel" style="transform-origin: 50% 50%;">
                    <!-- Outer Orange Ring Base -->
                    <circle cx="500" cy="500" r="430" fill="#0d0d0f" stroke="var(--accent-amber)" stroke-width="4" />
                    
                    <!-- Tactical Gear Teeth (Dasharray math: circumference 2*pi*r ~ 2576. 72 teeth = 35.7 dash) -->
                    <circle cx="500" cy="500" r="415" fill="none" stroke="#222" stroke-width="30" stroke-dasharray="17.8 17.8" />
                    
                    <!-- Bezel Inner Slant -->
                    <circle cx="500" cy="500" r="395" fill="url(#metalDark)" />
                    <circle cx="500" cy="500" r="335" fill="#050505" />

                    <!-- Bezel Ticks and Metrics -->
                    <circle cx="500" cy="500" r="375" fill="none" stroke="#555" stroke-width="20" stroke-dasharray="2 17.6" />
                    <!-- Thicker hour ticks -->
                    <circle cx="500" cy="500" r="375" fill="none" stroke="var(--accent-amber)" stroke-width="30" stroke-dasharray="8 88" />

                    <!-- Primary 12 O'Clock Dive Triangle -->
                    <polygon points="500,110 530,165 470,165" fill="var(--accent-amber)" />
                    <circle cx="500" cy="145" r="5" fill="#fff" />
                    
                    <text x="500" y="870" fill="#666" font-family="'JetBrains Mono'" font-weight="700" font-size="28" text-anchor="middle">30</text>
                    <text x="860" y="510" fill="#666" font-family="'JetBrains Mono'" font-weight="700" font-size="28" text-anchor="middle">15</text>
                    <text x="140" y="510" fill="#666" font-family="'JetBrains Mono'" font-weight="700" font-size="28" text-anchor="middle">45</text>
                </g>

                <!-- STATIC INNER DIAL -->
                <g id="watch-face-static" style="transform-origin: 50% 50%;">
                    <!-- Dial Glass & Inner Base -->
                    <circle cx="500" cy="500" r="330" fill="url(#dialGrad)" />
                    <circle cx="500" cy="500" r="330" fill="none" stroke="#444" stroke-width="2" />

                    <!-- Chronograph Subdials -->
                    <!-- Left Subdial (Milliseconds) -->
                    <circle cx="340" cy="500" r="65" fill="#050505" stroke="#1c1c1e" stroke-width="2"/>
                    <circle cx="340" cy="500" r="65" fill="none" stroke="#444" stroke-width="6" stroke-dasharray="4 16.4" />
                    <!-- Subdial Hand Group -->
                    <g id="subdial-msec" style="transform-origin: 340px 500px;">
                        <circle cx="340" cy="500" r="4" fill="#aaa" />
                        <polygon points="340,500 338,450 342,450" fill="#aaa" />
                    </g>

                    <!-- Bottom Subdial (Depth Gauge) -->
                    <circle cx="500" cy="650" r="65" fill="#050505" stroke="#1c1c1e" stroke-width="2"/>
                    <circle cx="500" cy="650" r="65" fill="none" stroke="var(--accent-amber)" stroke-width="6" stroke-dasharray="4 16.4" opacity="0.6"/>
                    <text x="500" y="615" fill="#444" font-family="'JetBrains Mono'" font-size="10" text-anchor="middle">DEPTH</text>
                    <!-- Subdial Hand Group -->
                    <g id="subdial-depth" style="transform-origin: 500px 650px; transform: rotate(-135deg);">
                        <circle cx="500" cy="650" r="4" fill="var(--accent-amber)" />
                        <polygon points="500,650 498,605 502,605" fill="var(--accent-amber)" />
                    </g>

                    <!-- LOM Custom Geometric Monogram -->
                    <g transform="translate(500, 260)">
                        <path d="M -32,-14 L -32,14 L -16,14" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="bevel" />
                        <circle cx="0" cy="0" r="15" fill="none" stroke="var(--accent-amber)" stroke-width="4" />
                        <path d="M 16,14 L 16,-14 L 24,4 L 32,-14 L 32,14" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="bevel" />
                    </g>

                    <!-- Inner Typography -->
                    <text x="500" y="340" fill="#fff" font-family="'Outfit', sans-serif" font-weight="700" font-size="34" letter-spacing="8" text-anchor="middle">LIFE OF MAN</text>
                    <text x="500" y="370" fill="var(--accent-amber)" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="4" text-anchor="middle">AUTOMATIC . 1500M</text>
                    
                    <!-- Exact Match Date Cutout Window -->
                    <rect x="690" y="475" width="80" height="50" rx="4" fill="#000" stroke="#333" stroke-width="2"/>
                    <text x="705" y="465" fill="#444" font-family="'JetBrains Mono'" font-size="12" letter-spacing="1">DATE</text>

                    <!-- Hour Index Markers Inner -->
                    <circle cx="500" cy="500" r="300" fill="none" stroke="#fff" stroke-width="12" stroke-dasharray="6 151" opacity="0.8"/>
                </g>
            </svg>
            
            <!-- Live Clock Overlay -->
            <div class="live-clock">
                <div class="date-window" id="date-window">--</div>
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand minute-hand" id="minute-hand"></div>
                <div class="hand second-hand" id="second-hand"></div>
                <div class="center-pin"></div>
            </div>

            <div class="multi-exposure-trail"></div>
        </div>

        <!-- Right: Technical Narrative Overlay -->
        <div class="info-panel boot-hidden" id="info-panel">
            <div class="technical-header boot-hidden" id="technical-header">
                <span class="pulse-dot"></span>
                <p class="mono-text typing-effect">SECTION IN FOCUS: <span id="dyn-section-name" class="highlight"></span></p>
            </div>

            <div class="narrative-content">
                <p id="dyn-story-text" class="story-text"></p>

                <div id="data-points-container" class="data-points" style="display: none; opacity: 0;">
                    <div class="data-row"><span id="dyn-label-1" class="data-label">—</span> <span id="dyn-value-1" class="data-value">—</span></div>
                    <div class="data-row"><span id="dyn-label-2" class="data-label">—</span> <span id="dyn-value-2" class="data-value">—</span></div>
                    <div class="data-row"><span id="dyn-label-3" class="data-label">—</span> <span id="dyn-value-3" class="data-value">—</span></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
